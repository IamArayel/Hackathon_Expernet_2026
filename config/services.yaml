services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Service\AiService:
        arguments:
            $fallbackApiKey: '%env(NVIDIA_API_KEY)%'

    Symfony\Component\Security\Http\Authenticator\FormLoginAuthenticator:
        alias: security.authenticator.form_login.main
        public: true
